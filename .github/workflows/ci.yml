name: CI
on:
  push: {branches: [main]}
  pull_request: {branches: [main]}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate structure
        run: bash tests/validate-structure.sh
      - name: Validate JSON
        run: for f in src/archetypes/*.json; do python3 -m json.tool "$f" >/dev/null; done
